# container_security テスト用 Veil 設定（docker/assets/conf.d をベースに拡張）
# h2spec 要件: GET/POST / が 200 + 非空ボディ。H2C 8443 で cleartext HTTP/2 も検証。

[server]
listen = "0.0.0.0:443"
http = "0.0.0.0:80"
http2_enabled = true
h2c_enabled = true
h2c_listen = "0.0.0.0:8443"
threads = 0

[logging]
level = "info"

[security]
allow_security_failures = false
drop_privileges_user = "nonroot"
drop_privileges_group = "nonroot"
enable_seccomp = true
enable_landlock = true
enable_sandbox = false
seccomp_mode = "filter"
# Proxy 上流（Toxiproxy）への DNS 解決に /etc/resolv.conf・NSS ライブラリが必要
landlock_read_paths = [
  "/var/www",
  "/var/cache/veil",
  "/var/tmp/veil",
  "/etc/veil",
  "/etc/resolv.conf",
  "/etc/hosts",
  "/etc/nsswitch.conf",
  "/lib",
  "/lib64",
  "/usr",
]
landlock_write_paths = ["/var/cache/veil", "/var/tmp/veil"]

[performance]
huge_pages_enabled = false
reuseport_balancing = "cbpf"

[prometheus]
enabled = true
path = "/__metrics"

[upstreams."toxi-pool"]
algorithm = "round_robin"
servers = ["http://veil-sec-toxiproxy:8480/"]

[upstreams."toxi-pool".circuit_breaker]
enabled = true
failure_threshold = 3
failure_window_secs = 30
open_duration_secs = 10
half_open_probes = 1
success_threshold = 1
trip_on_timeout = true

[tls]
cert_path = "/etc/veil/ssl/cert.pem"
key_path = "/etc/veil/ssl/key.pem"
ktls_enabled = true
ktls_fallback_enabled = true

[[route]]
[route.conditions]
path = "/api/"
[route.action]
type = "Proxy"
upstream = "toxi-pool"
[route.security]
allowed_methods = ["HEAD", "GET", "POST"]

[[route]]
[route.conditions]
path = "/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["HEAD", "GET", "POST"]