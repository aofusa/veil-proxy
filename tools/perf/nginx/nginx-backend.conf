# perf 逆プロキシ計測（feat_proxy / feat_buffering）用の上流バックエンド。
# veil が中継する先。平文 HTTP:80 で /var/www を配信する（TLS 終端は veil 側）。
worker_processes auto;
events { worker_connections 8192; }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log off;
    error_log  /dev/stderr warn;
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    keepalive_requests 100000;

    server {
        listen 80;
        server_name _;
        root /var/www;
        location / {
            index index.html;
        }
    }
}
