# container_security テスト用 Veil 設定（docker/assets/conf.d をベースに拡張）
# h2spec 要件: GET/POST / が 200 + 非空ボディ。H2C 8443 で cleartext HTTP/2 も検証。
#
# full features ビルドで default(ktls/http2/mimalloc) に加えて有効化される機能
# （compression / cache / buffering / rate-limit / admin / access-log / http3 /
#  l4-proxy / websocket / opentelemetry）も、稼働中のプロキシで有効化して
# ファジング・カオス・h2spec・セキュリティスキャンが full 機能面を通過するようにする。

[server]
listen = "0.0.0.0:443"
http = "0.0.0.0:80"
http2_enabled = true
http3_enabled = true
h2c_enabled = true
h2c_listen = "0.0.0.0:8443"
threads = 0

[logging]
level = "info"

[security]
allow_security_failures = false
drop_privileges_user = "nonroot"
drop_privileges_group = "nonroot"
enable_seccomp = true
enable_landlock = true
enable_sandbox = false
seccomp_mode = "filter"
# Proxy 上流（Toxiproxy）への DNS 解決に /etc/resolv.conf・NSS ライブラリが必要
landlock_read_paths = [
  "/var/www",
  "/var/cache/veil",
  "/var/tmp/veil",
  "/etc/veil",
  "/etc/resolv.conf",
  "/etc/hosts",
  "/etc/nsswitch.conf",
  "/lib",
  "/lib64",
  "/usr",
]
# full: WASM モジュール (.wasm / .cwasm AOT キャッシュ書込は /var/tmp/veil)
landlock_write_paths = ["/var/cache/veil", "/var/tmp/veil"]

[performance]
huge_pages_enabled = false
reuseport_balancing = "cbpf"

[prometheus]
enabled = true
path = "/__metrics"

# full: 管理 API（Bearer 認証 + IP 制限つき）。設定ロード・エンドポイント経路を有効化。
[admin]
enabled = true
path_prefix = "/__admin"
secret = "veil-sec-test-admin"

# full: 構造化アクセスログ（stdout・非同期スレッド）。ホットパスのアクセスログ経路を有効化。
[access_log]
enabled = true
format = "json"

# full: HTTP/3（QUIC over UDP 443）。ハンドシェイク/設定経路を有効化。
[http3]
listen = "0.0.0.0:443"
compression_enabled = true

# full: OTLP ブリッジ（到達不能エンドポイントでもプロセスが生存することを検証）
[opentelemetry]
enabled = true
endpoint = "http://127.0.0.1:1"
service_name = "veil-sec-test"
batch_interval_secs = 5

# full: Proxy-Wasm モジュール（header_filter: 応答ヘッダへ X-Veil-Processed を付与）
[wasm]
enabled = true

[wasm.defaults]
# fuel 枯渇プローブ（W-06）用。header_filter は軽量のため通常は完走する。
max_execution_time_ms = 50

[[wasm.modules]]
name = "header_filter"
path = "/etc/veil/wasm/header_filter.wasm"
configuration = '{"add_header": "X-Wasm-Processed", "add_value": "true"}'

[wasm.modules.capabilities]
allow_logging = true
allow_request_headers_read = true
allow_request_headers_write = true
allow_response_headers_read = true
allow_response_headers_write = true
allow_send_local_response = true

[[wasm.modules]]
name = "fuel_burner"
path = "/etc/veil/wasm/fuel_burner.wasm"
configuration = '{}'

[wasm.modules.capabilities]
allow_logging = true
allow_response_headers_read = true
allow_response_headers_write = true

[upstreams."toxi-pool"]
algorithm = "round_robin"
servers = ["http://veil-sec-toxiproxy:8480/"]

[upstreams."toxi-pool".circuit_breaker]
enabled = true
failure_threshold = 3
failure_window_secs = 30
open_duration_secs = 10
half_open_probes = 1
success_threshold = 1
trip_on_timeout = true

[tls]
cert_path = "/etc/veil/ssl/cert.pem"
key_path = "/etc/veil/ssl/key.pem"
ktls_enabled = true
ktls_fallback_enabled = true

# full: L4（TCP）ストリームプロキシ。TLS パススルーで Toxiproxy 上流へ中継する
# リスナーを 4443 に立てる（設定・起動経路を有効化。接続時にのみ上流へダイヤル）。
[[l4]]
name = "l4-passthrough"
listen = "0.0.0.0:4443"
lb = "round_robin"
tls = "passthrough"

  [[l4.upstreams]]
  addr = "veil-sec-toxiproxy:8480"

# Proxy 経路（/api/）: full の buffering を有効化（rate-limit は専用経路で検証）。
[[route]]
[route.conditions]
path = "/api/"
[route.action]
type = "Proxy"
upstream = "toxi-pool"
[route.buffering]
mode = "adaptive"
[route.security]
allowed_methods = ["HEAD", "GET", "POST"]

# full: レートリミット検証専用（低閾値で 429 を期待）
[[route]]
[route.conditions]
path = "/rate-limit/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["GET"]
# ワーカーごとに thread_local カウンタのため、閾値を低くして 429 を安定検出
rate_limit_requests_per_min = 5

# full: WebSocket プロキシ経路（異常 Upgrade 耐性検証。上流は HTTP のみだがプロキシ層を通過）
[[route]]
[route.conditions]
path = "/ws/"
[route.action]
type = "Proxy"
upstream = "toxi-pool"
[route.security]
allowed_methods = ["GET"]

# full: gRPC プロキシ経路（H2C 上流・不正フレーム耐性検証）
[[route]]
[route.conditions]
path = "/grpc.test.v1.TestService/"
[route.action]
type = "Proxy"
upstream = "toxi-pool"
use_h2c = true
[route.security]
allowed_methods = ["POST"]

# full: Proxy-Wasm フィルタ適用経路（静的 File で上流不要・フィルタ動作のみ検証）
[[route]]
modules = ["header_filter"]
[route.conditions]
path = "/wasm/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["GET"]

# full: fuel 枯渇モジュール経路（W-06。タイムアウト内応答 + プロセス生存を検証）
[[route]]
modules = ["fuel_burner"]
[route.conditions]
path = "/wasm-fuel/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["GET"]

# full: キャッシュ経路（GET をインメモリキャッシュ）。File 配信 + cache を有効化。
[[route]]
[route.conditions]
path = "/cached/*"
[route.action]
type = "File"
path = "/var/www/"
[route.cache]
enabled = true
default_ttl_secs = 5
methods = ["GET"]
cacheable_statuses = [200]
[route.security]
allowed_methods = ["HEAD", "GET"]

# 既定 File 経路（h2spec 要件: GET/POST / が 200 + 非空ボディ）。
# full: レスポンス圧縮を有効化（Accept-Encoding 時に gzip/br/zstd）。
[[route]]
[route.conditions]
path = "/"
[route.action]
type = "File"
path = "/var/www/"
[route.compression]
enabled = true
preferred_encodings = ["zstd", "br", "gzip"]
min_size = 256
[route.security]
allowed_methods = ["HEAD", "GET", "POST"]
