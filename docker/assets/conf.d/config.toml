# Veil コンテナ用デフォルト設定
# default features（ktls, http2, mimalloc）で動作する最小構成
# セキュリティ機能（seccomp/Landlock）は有効化
# サンドボックス機能はコンテナエンジンと衝突するので無効化
# パフォーマンス設定はコンテナ向けの汎用設定
# ktlsはコンテナ環境のvethと相性が悪いためオフ

[server]
listen = "0.0.0.0:443"
http = "0.0.0.0:80"
http2_enabled = true
threads = 0

[logging]
level = "info"

[security]
allow_security_failures = false
drop_privileges_user = "nonroot"
drop_privileges_group = "nonroot"
enable_seccomp = true
enable_landlock = true
enable_sandbox = false
seccomp_mode = "filter"
landlock_read_paths = [
  # ファイル配信ディレクトリ（プロキシ機能のみであれば不要）
  "/var/www",
  # キャッシュ・バッファリングの一時ディレクトリ（キャッシュ・バッファを使用しないなら不要）
  "/var/cache/veil",
  "/var/tmp/veil",
  # プロキシ機能の名前解決に必要（ファイル配信のみであれば不要）
  "/etc/veil",
  "/etc/resolv.conf",
  "/etc/hosts",
  "/etc/nsswitch.conf",
  "/lib",
  "/lib64",
  "/usr"
]
landlock_write_paths = ["/var/cache/veil", "/var/tmp/veil"]

[performance]
huge_pages_enabled = false
reuseport_balancing = "cbpf"

[tls]
cert_path = "/etc/veil/ssl/cert.pem"
key_path = "/etc/veil/ssl/key.pem"
ktls_enabled = false

[[route]]
[route.conditions]
path = "/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["HEAD", "GET"]
