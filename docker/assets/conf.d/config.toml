# Veil コンテナ用デフォルト設定
# default features（ktls, http2, mimalloc）で動作する最小構成
# セキュリティ機能（seccomp/Landlock）は有効化
# サンドボックス機能はコンテナエンジンと衝突するので無効化
# パフォーマンス設定はコンテナ向けの汎用設定
# ktlsは利用可能であれば使用、不可であればrustlsにフォールバック

[server]
listen = "0.0.0.0:443"
http = "0.0.0.0:80"
http2_enabled = true
threads = 0

[logging]
level = "info"

[security]
allow_security_failures = false
drop_privileges_user = "nonroot"
drop_privileges_group = "nonroot"
enable_seccomp = true
enable_landlock = true
enable_sandbox = false
seccomp_mode = "filter"
landlock_read_paths = ["/var/www"]
landlock_write_paths = []

[performance]
huge_pages_enabled = false
reuseport_balancing = "cbpf"

[tls]
cert_path = "/etc/veil/ssl/cert.pem"
key_path = "/etc/veil/ssl/key.pem"
ktls_enabled = true
ktls_fallback_enabled = true

[[route]]
[route.conditions]
path = "/"
[route.action]
type = "File"
path = "/var/www/"
[route.security]
allowed_methods = ["HEAD", "GET"]
